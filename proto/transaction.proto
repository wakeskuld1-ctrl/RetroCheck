syntax = "proto3";
package transaction;

service DatabaseService {
  rpc Execute (ExecuteRequest) returns (ExecuteResponse);
  rpc Prepare (PrepareRequest) returns (PrepareResponse);
  rpc Commit (CommitRequest) returns (CommitResponse);
  rpc Rollback (RollbackRequest) returns (RollbackResponse);
  rpc GetVersion (GetVersionRequest) returns (GetVersionResponse);
  rpc CheckHealth (Empty) returns (Empty);
}

// ### ???? (2026-03-01)
// - ??: ????????????????
// - ??: ????????????????
service OrderRulesAdmin {
  rpc UpdateRules (UpdateRulesRequest) returns (UpdateRulesResponse);
  rpc GetRulesVersion (GetRulesVersionRequest) returns (GetRulesVersionResponse);
}

service ClusterAdmin {
  rpc AddHub (AddHubRequest) returns (AddHubResponse);
  // ### ????
  // - 2026-03-15: ??: ?? add_edge/remove_hub ??
  // - 2026-03-15: ??: ?????????????
  rpc AddEdge (AddEdgeRequest) returns (AddEdgeResponse);
  rpc RemoveHub (RemoveHubRequest) returns (RemoveHubResponse);
}

message ExecuteRequest { string sql = 1; }
message ExecuteResponse { int32 rows_affected = 1; }

message PrepareRequest {
  string tx_id = 1;
  string sql = 2;
  repeated string args = 3;
}
message PrepareResponse {}

message CommitRequest { string tx_id = 1; }
message CommitResponse {}

message RollbackRequest { string tx_id = 1; }
message RollbackResponse {}

message GetVersionRequest { string table = 1; }
message GetVersionResponse { int32 version = 1; }

message Empty {}

// ### ???? (2026-03-01)
// - ??: ?????? JSON
// - ??: ????????????
message UpdateRulesRequest { string rules_json = 1; }
// ### ???? (2026-03-01)
// - ??: ????????
// - ??: ????????????
message UpdateRulesResponse { uint64 version = 1; }
// ### ???? (2026-03-01)
// - ??: ????????
// - ??: ????????????
message GetRulesVersionRequest {}
// ### ???? (2026-03-01)
// - ??: ??????????
// - ??: ??????????
message GetRulesVersionResponse { uint64 version = 1; }

message AddHubRequest {
  uint64 node_id = 1;
  string raft_addr = 2;
  string grpc_addr = 3;
  bool auto_promote = 4;
  string request_id = 5;
  NodeCompatibility compatibility = 6;
}

message AddHubResponse {
  uint64 membership_version = 1;
  string leader_hint = 2;
  string reason_code = 3;
  string suggested_action = 4;
}

// ### ????
// - 2026-03-15: ??: ???? add_edge/remove_hub ???????
// - 2026-03-15: ??: ?? RPC ??????????
message AddEdgeRequest {
  string edge_id = 1;
  string group_id = 2;
  string request_id = 3;
}

message AddEdgeResponse {
  bool ready = 1;
  string reason_code = 2;
  string suggested_action = 3;
}

message RemoveHubRequest {
  uint64 node_id = 1;
  string request_id = 2;
  string phase = 3;
  bool force = 4;
  uint64 drain_timeout_ms = 5;
}

message RemoveHubResponse {
  uint64 membership_version = 1;
  string leader_hint = 2;
  string reason_code = 3;
  string suggested_action = 4;
  string status = 5;
}

message NodeCompatibility {
  string app_semver = 1;
  uint32 sqlite_schema_version = 2;
  uint32 sled_format_version = 3;
  uint32 log_codec_version = 4;
}
